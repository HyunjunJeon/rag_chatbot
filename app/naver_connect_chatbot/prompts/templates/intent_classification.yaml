_type: chat_messages
metadata:
  name: intent_classification
  description: Classify user intent for adaptive retrieval strategy with OOD detection
  version: "5.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Classify the current user question into one intent for adaptive RAG routing.

      ## Critical Rules
      - Select exactly one intent:
        - `SIMPLE_QA`: direct factual or procedural question.
        - `COMPLEX_REASONING`: comparison, trade-off, synthesis, or multi-step reasoning.
        - `EXPLORATORY`: broad learning path, overview, roadmap, or open-ended guidance.
        - `CLARIFICATION_NEEDED`: unresolved ambiguity that requires clarification.
        - `OUT_OF_DOMAIN`: unrelated to AI/ML learning, programming, or bootcamp education context.
      - Return `confidence` and `domain_relevance` as floats in [0.0, 1.0].
      - Hard constraint: if `domain_relevance < 0.2`, intent must be `OUT_OF_DOMAIN`.

      ## Grounding & Multi-turn Rules
      - Base decisions only on the provided question and conversation history.
      - Resolve pronouns, omitted entities, and references from prior turns when possible.
      - If history resolves ambiguity, do not use `CLARIFICATION_NEEDED`.
      - If ambiguity remains unresolved, use `CLARIFICATION_NEEDED`.

      ## Output Contract
      Return JSON only (no code fences, no extra text) with these keys:
      - `intent`: enum string.
      - `confidence`: float [0.0, 1.0].
      - `domain_relevance`: float [0.0, 1.0].
      - `reasoning`: brief evidence-based explanation.

      ## Final Check
      - Intent is one of the allowed labels.
      - Scores are in valid ranges.
      - Domain threshold rule is satisfied.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Current Question:
      {question}

      Return the classification JSON now.

input_variables:
  - question
  - conversation_history
