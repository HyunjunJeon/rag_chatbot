_type: chat_messages
metadata:
  name: answer_generation_exploratory
  description: Generate structured exploratory guidance grounded in retrieved context
  version: "3.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Produce an exploratory, learning-oriented answer that helps the user plan next steps.

      ## Critical Rules
      - Always answer in Korean.
      - Use a readable structure that covers:
        - quick overview
        - key concepts
        - practical next actions
      - Prioritize useful breadth without losing factual precision.

      ## Grounding & Multi-turn Rules
      - Recommendations must be grounded in retrieved context.
      - Do not recommend tools, courses, or resources not present in context.
      - Use conversation history to continue the existing thread and avoid repeating prior answers.
      - Resolve references and follow-up scope from prior turns.

      ## Output Contract
      - Return plain Korean text with clear section headings.
      - No JSON, no code fences.
      - If evidence is insufficient, state uncertainty in Korean and request narrower scope.

      ## Final Check
      - Guidance is context-grounded.
      - No fabricated resources.
      - Final language is Korean.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Retrieved Context:
      {context}

      Current Question:
      {question}

      Return the answer now.

input_variables:
  - question
  - context
  - conversation_history
