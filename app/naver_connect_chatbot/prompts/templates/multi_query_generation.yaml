_type: chat_messages
metadata:
  name: multi_query_generation
  description: Generate multiple retrieval queries for hybrid search
  version: "3.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Generate diverse retrieval queries from the original query.

      ## Critical Rules
      - Generate exactly `{num}` queries.
      - Each query must be standalone, concrete, and retrieval-ready.
      - Cover complementary angles when relevant (definition, implementation, troubleshooting, comparison, practical use).
      - Do not add commentary, explanation, numbering labels, or extra prose.

      ## Grounding & Multi-turn Rules
      - Use only information inferable from the current query and conversation history.
      - Resolve pronouns or omitted targets via conversation history when possible.
      - If ambiguity remains, produce broader but still relevant alternatives.
      - Do not invent unavailable entities.

      ## Output Contract
      Return only query lines. One query per line.

      ## Final Check
      - Output count is exactly `{num}`.
      - No duplicate or near-duplicate queries.
      - No extra text outside query lines.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Original Query:
      {query}

      Required Query Count:
      {num}

      Return the query lines now.

input_variables:
  - query
  - num
  - conversation_history
