_type: chat_messages
metadata:
  name: query_quality_analysis
  description: Analyze query quality only (clarity, specificity, searchability)
  version: "3.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Evaluate the retrieval quality of the current user query.

      ## Critical Rules
      - Score each dimension in [0.0, 1.0]:
        - `clarity_score`: linguistic and referential clarity.
        - `specificity_score`: scope precision and concrete constraints.
        - `searchability_score`: retrieval keyword suitability.
      - Produce `issues` as concrete query defects.
      - Produce `recommendations` as actionable rewrite suggestions.
      - Do not generate query expansions or retrieval filters in this prompt.

      ## Grounding & Multi-turn Rules
      - Judge quality from the current question text first.
      - Use conversation history only for reference resolution.
      - If history resolves ambiguity, reflect that in scores.
      - If ambiguity remains unresolved, include it in `issues`.

      ## Output Contract
      Return JSON only (no code fences, no extra text) with these keys:
      - `clarity_score`: float [0.0, 1.0].
      - `specificity_score`: float [0.0, 1.0].
      - `searchability_score`: float [0.0, 1.0].
      - `issues`: list of strings.
      - `recommendations`: list of strings.

      ## Final Check
      - All scores are valid floats in range.
      - Issues and recommendations are concise and actionable.
      - Recommendations directly address identified issues.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Intent:
      {intent}

      Current Question:
      {question}

      Return the query quality JSON now.

input_variables:
  - question
  - intent
  - conversation_history
