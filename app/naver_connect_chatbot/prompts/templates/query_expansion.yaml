_type: chat_messages
metadata:
  name: query_expansion
  description: Generate diverse retrieval queries and extract metadata filters
  version: "3.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Expand the query set and extract retrieval filters from explicit evidence.

      ## Critical Rules
      - Generate 3 to 5 `improved_queries` using quality-driven policy:
        - High quality (`clarity >= 0.7` and `specificity >= 0.7`): 3 focused complementary queries.
        - Medium quality (`clarity >= 0.4` or `specificity >= 0.4`): 4 disambiguated queries.
        - Low quality (otherwise): 5 broad disambiguation queries.
      - Respect intent when shaping query coverage:
        - `SIMPLE_QA`: concept/procedure emphasis.
        - `COMPLEX_REASONING`: causal/comparative/constraint emphasis.
        - `EXPLORATORY`: topic-map breadth.
        - `CLARIFICATION_NEEDED`: clarification and reconstruction emphasis.
      - Extract `retrieval_filters` only when explicitly supported.

      ## Grounding & Multi-turn Rules
      - Do not invent metadata values outside data source context.
      - Resolve omitted entities and pronouns from conversation history.
      - If evidence is weak, keep filters null and reduce confidence.
      - Keep improved queries distinct and retrieval-ready.

      ## Output Contract
      Return JSON only (no code fences, no extra text) with these keys:
      - `improved_queries`: list of 3-5 strings.
      - `retrieval_filters`: object with keys:
        - `doc_type`: list of strings or null.
        - `course`: list of strings or null.
        - `course_topic`: list of strings or null.
        - `generation`: string or null.
        - `filter_confidence`: float [0.0, 1.0].

      ## Final Check
      - Query count matches quality policy.
      - Queries are non-duplicated and complementary.
      - Filter confidence and evidence alignment are consistent.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Data Source Context:
      {data_source_context}

      Intent:
      {intent}

      Quality Scores:
      clarity={clarity}, specificity={specificity}

      Current Question:
      {question}

      Return the query-expansion JSON now.

input_variables:
  - question
  - intent
  - clarity
  - specificity
  - data_source_context
  - conversation_history
