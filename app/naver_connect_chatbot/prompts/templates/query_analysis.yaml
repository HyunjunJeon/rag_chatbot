_type: chat_messages
metadata:
  name: query_analysis
  description: Analyze query quality, generate diverse search queries, and extract retrieval filters
  version: "7.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Perform integrated pre-retrieval optimization for adaptive RAG.

      ## Critical Rules
      - Return quality scores:
        - `clarity_score`, `specificity_score`, `searchability_score` in [0.0, 1.0].
      - Generate `improved_queries` (3 to 5 total):
        - `SIMPLE_QA`: 3 focused retrieval queries.
        - `COMPLEX_REASONING`: 4 to 5 complementary reasoning queries.
        - `EXPLORATORY`: 5 breadth-oriented exploration queries.
        - `CLARIFICATION_NEEDED`: 3 disambiguation-oriented queries.
      - Return `issues` and `recommendations`.
      - Extract `retrieval_filters` only from explicit evidence plus allowed values in data source context.

      ## Grounding & Multi-turn Rules
      - Do not invent courses, sources, tools, datasets, or generations.
      - Resolve references using conversation history.
      - If uncertainty remains, keep filters broad/null and document uncertainty in `issues`.
      - Keep each improved query self-contained and retrieval-ready.

      ## Output Contract
      Return JSON only (no code fences, no extra text) with these keys:
      - `clarity_score`: float [0.0, 1.0].
      - `specificity_score`: float [0.0, 1.0].
      - `searchability_score`: float [0.0, 1.0].
      - `improved_queries`: list of 3-5 strings.
      - `issues`: list of strings.
      - `recommendations`: list of strings.
      - `retrieval_filters`: object with keys:
        - `doc_type`: list of strings or null.
        - `course`: list of strings or null.
        - `course_topic`: list of strings or null.
        - `generation`: string or null.
        - `filter_confidence`: float [0.0, 1.0].

      ## Final Check
      - Query count and intent policy are aligned.
      - Queries are diverse and non-duplicated.
      - Filters are explicit, schema-compatible, and conservative.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Data Source Context:
      {data_source_context}

      Intent:
      {intent}

      Current Question:
      {question}

      Return the full query-analysis JSON now.

input_variables:
  - question
  - intent
  - data_source_context
  - conversation_history
