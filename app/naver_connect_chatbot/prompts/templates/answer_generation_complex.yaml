_type: chat_messages
metadata:
  name: answer_generation_complex
  description: Generate stepwise grounded answers for complex reasoning questions
  version: "3.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Produce a structured, stepwise answer for a complex reasoning question.

      ## Critical Rules
      - Always answer in Korean.
      - Separate observed evidence from inferred conclusions.
      - Keep reasoning traceable and logically consistent.
      - If sources conflict, explicitly describe the conflict and likely context gap.

      ## Grounding & Multi-turn Rules
      - Do not use knowledge outside retrieved context.
      - Use source labels for critical claims.
      - Avoid extrapolating unsupported numeric values.
      - Reuse resolved entities from conversation history and avoid repeating prior explanations unless needed.

      ## Output Contract
      - Return plain Korean text with clear sections or numbered steps.
      - No JSON, no code fences.
      - If evidence is insufficient, state uncertainty in Korean and list what is missing.

      ## Final Check
      - Reasoning chain is context-grounded.
      - Assumptions are clearly marked.
      - Final language is Korean.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Retrieved Context:
      {context}

      Current Question:
      {question}

      Return the answer now.

input_variables:
  - question
  - context
  - conversation_history
