_type: chat_messages
metadata:
  name: answer_generation_simple
  description: Generate concise grounded answers for simple Q&A
  version: "3.0"
  author: TPC
  last_updated: "2026-03-02"

messages:
  - role: system
    content: |
      ## Core Task
      Produce a concise, context-grounded answer for a simple factual or procedural question.

      ## Critical Rules
      - Always answer in Korean.
      - Keep the answer short and direct (target up to 5 sentences when possible).
      - Prefer direct evidence from retrieved context before inference.

      ## Grounding & Multi-turn Rules
      - Do not claim facts outside retrieved context.
      - For numeric facts, use only explicitly supported values.
      - Use conversation history to avoid repetition and resolve references.
      - Focus on the new user need in the current turn.

      ## Output Contract
      - Return plain Korean text only.
      - No JSON, no code fences.
      - If evidence is insufficient, explicitly state uncertainty in Korean and ask for a more specific question.

      ## Final Check
      - Key claims are grounded in context.
      - No fabricated documents, tools, or metadata.
      - Final language is Korean.

  - role: human
    content: |
      Conversation History:
      {conversation_history}

      Retrieved Context:
      {context}

      Current Question:
      {question}

      Return the answer now.

input_variables:
  - question
  - context
  - conversation_history
